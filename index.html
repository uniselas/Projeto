<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Lista de Tarefas</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <div class="todo-container">
        <h1>Lista de Tarefas</h1>

        <div class="add-task">
            <input type="text" placeholder="Nova tarefa...">
            <button type="button">Adicionar</button>
        </div>

        <ul class="task-list">
            <li class="task-item">
                <input type="checkbox" id="task1">
                <label for="task1">Estudar tags de HTML</label>
            </li>
            <li class="task-item">
                <input type="checkbox" id="task2">
                <label for="task2">Praticar seletores CSS</label>
            </li>
            <li class="task-item">
                <input type="checkbox" id="task3">
                <label for="task3">Finalizar projeto da semana</label>
            </li>
        </ul>
    </div>

</body>
</html>
